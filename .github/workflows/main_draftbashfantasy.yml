# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - draftbashfantasy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://index.docker.io/v1/
        username: ${{ secrets.AzureAppService_ContainerUsername_01c31cd5165e4ebf90d98fd84b271ac2 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_7b401f85355b45df9363f3b5091fb3b8 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: index.docker.io/${{ secrets.AzureAppService_ContainerUsername_01c31cd5165e4ebf90d98fd84b271ac2 }}/sfeddes/draftbash:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'draftbashfantasy'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_403ae241751049bdb6bbf7a412246954 }}
        images: 'index.docker.io/${{ secrets.AzureAppService_ContainerUsername_01c31cd5165e4ebf90d98fd84b271ac2 }}/sfeddes/draftbash:${{ github.sha }}'